<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Find Your Bus</title>
		<link rel="stylesheet" th:href="@{/css/styleIndex.css}">
	</head>
	
	<body>
		<form class="bus-form" method="get" action="/bookings/search">
			<h2>Find Your Bus</h2>
			<div class="form-group">
				<label for="departure">Departure City</label>
				<input type="text" id="departure" name="departureCity" placeholder="Enter departure city">
			</div>
			<div class="form-group">
				<label for="arrival">Arrival City</label>
				<input type="text" id="arrival" name="arrivalCity" placeholder="Enter arrival city">
			</div>
			<div class="form-group">
				<label for="date">Date of Travel</label>
				<input type="date" id="date" name="date">
			</div>
			<input type="submit" class="search-btn" id="search-btn" value="Search Buses">
		</form>
	</body>
</html>
