<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Bus Seat Booking</title>
		<link rel="stylesheet" th:href="@{/css/styleBusSeatsList.css}">
	</head>

	<body>
		<!-- Bus Details -->
		<div class="bus-details">
			<h3>Express Deluxe</h3>
			<p>AC Sleeper</p>
			<p>📅 2023-07-15 - 2023-07-16</p>
			<p>📍 Bengaluru → Chennai</p>
			<p>🕒 22:00 - 06:00 (8h)</p>
		</div>

		<!-- Seat Map -->
		<h3>Select Your Seats</h3>
		<div class="seat-map" id="seatMap"></div>
		
		<!-- Legend -->
		<div class="legend">
			<span style="background:green;"></span> Available
			<span style="background:blue; margin-left:15px;"></span> Selected
			<span style="background:purple; margin-left:15px;"></span> Booked
		</div>
		
		<!-- Booking Summary -->
		<div class="summary">
			<h4>Booking Summary</h4>
			<p id="selectedSeats">Selected Seats: None</p>
			<p id="totalPrice">Total Price: ₹0</p>
			<button class="pay-btn" onclick="proceedPayment()">Proceed to Payment</button>
		</div>
		
		<script>
			const seatMap = document.getElementById('seatMap');
			const selectedSeatsEl = document.getElementById('selectedSeats');
			const totalPriceEl = document.getElementById('totalPrice');
			const seatPrice = 1000; // price per seat
			const bookedSeats = [7, 8, 15]; // example booked seats
			let selectedSeats = [];
			
			// Generate seat map
			for (let i = 1; i <= 32; i++) {
				const seat = document.createElement('div');
				seat.classList.add('seat');
				seat.innerText = i;
				
				if (bookedSeats.includes(i)) {
					seat.classList.add('booked');
				}
				else {
					seat.classList.add('available');
					seat.addEventListener('click', () => toggleSeat(i, seat));
				}
				
				seatMap.appendChild(seat);
			}
			
			function toggleSeat(seatNumber, seatElement) {
				if (selectedSeats.includes(seatNumber)) {
					selectedSeats = selectedSeats.filter(s => s !== seatNumber);
					seatElement.classList.remove('selected');
					seatElement.classList.add('available');
				}
				else {
					selectedSeats.push(seatNumber);
					seatElement.classList.remove('available');
					seatElement.classList.add('selected');
				}
				updateSummary();
			}
			
			function updateSummary() {
				if (selectedSeats.length > 0) {
					selectedSeatsEl.innerText = `Selected Seats: ${selectedSeats.join(', ')}`;
					totalPriceEl.innerText = `Total Price: ₹${selectedSeats.length * seatPrice}`;
				}
				else {
					selectedSeatsEl.innerText = "Selected Seats: None";
					totalPriceEl.innerText = "Total Price: ₹0";
				}
			}
			
			function proceedPayment() {
				if (selectedSeats.length > 0) {
					alert(`Proceeding to payment for seats: ${selectedSeats.join(', ')}\nTotal: ₹${selectedSeats.length * seatPrice}`);
				}
				else {
					alert("Please select at least one seat.");
				}
			}
		</script>
	</body>
</html>
