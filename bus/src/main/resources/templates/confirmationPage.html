<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Bus Booking Confirmation</title>
		<link rel="stylesheet" th:href="@{/css/stylePassengerDetails.css}">
	</head>
	
	<body>
		<div class="container">
			<h2>Bus Ticket Booking</h2>
	
			<!-- Passenger Details -->
			<div class="section">
				<h3>Passenger Details</h3>
				<div class="form-group">
					<label>Passenger 1 Name</label>
					<input type="text" id="p1Name" placeholder="Enter name">
				</div>
				<div class="form-group">
					<label>Passenger 1 Age</label>
					<input type="number" id="p1Age" placeholder="Enter age">
				</div>
				<div class="form-group">
					<label>Passenger 1 Gender</label>
					<div class="gender-options">
						<label><input type="radio" name="p1Gender" value="Male"> Male</label>
						<label><input type="radio" name="p1Gender" value="Female"> Female</label>
						<label><input type="radio" name="p1Gender" value="Other"> Other</label>
					</div>
				</div>
	
				<div class="form-group">
					<label>Passenger 2 Name</label>
					<input type="text" id="p2Name" placeholder="Enter name">
				</div>
				<div class="form-group">
					<label>Passenger 2 Age</label>
					<input type="number" id="p2Age" placeholder="Enter age">
				</div>
				<div class="form-group">
					<label>Passenger 2 Gender</label>
					<div class="gender-options">
						<label><input type="radio" name="p2Gender" value="Male"> Male</label>
						<label><input type="radio" name="p2Gender" value="Female"> Female</label>
						<label><input type="radio" name="p2Gender" value="Other"> Other</label>
					</div>
				</div>
			</div>
	
			<!-- Bus Details -->
			<div class="section">
				<h3>Bus Details</h3>
				<p><strong>Express Deluxe</strong></p>
				<p>AC Sleeper</p>
				<p>Route: Bengaluru → Chennai</p>
				<p>Date: 2023-07-15</p>
				<p>Time: 22:00 - 06:00 (8h)</p>
			</div>
	
			<!-- Booking Summary -->
			<div class="section summary">
				<h3>Booking Summary</h3>
				<p>Selected Seats: 13, 14</p>
				<p>Total Price: ₹2000</p>
			</div>
	
			<!-- Confirm Button -->
			<button class="confirm-btn" onclick="confirmBooking()">Confirm Booking</button>
		</div>
	
		<script>
			function confirmBooking() {
				const p1Name = document.getElementById('p1Name').value;
				const p1Age = document.getElementById('p1Age').value;
				const p1Gender = document.querySelector('input[name="p1Gender"]:checked');
				const p2Name = document.getElementById('p2Name').value;
				const p2Age = document.getElementById('p2Age').value;
				const p2Gender = document.querySelector('input[name="p2Gender"]:checked');
	
				if (!p1Name || !p1Age || !p1Gender || !p2Name || !p2Age || !p2Gender) {
					alert("Please fill all passenger details.");
					return;
				}
	
				alert(`Booking Confirmed!\nPassenger 1: ${p1Name}, ${p1Age}, ${p1Gender.value}\nPassenger 2: ${p2Name}, ${p2Age}, ${p2Gender.value}\nSeats: 13, 14\nTotal: ₹2000`);
			}
		</script>
	</body>
</html>
