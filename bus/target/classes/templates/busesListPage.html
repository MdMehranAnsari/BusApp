	<body>
		<!-- Filters -->
		<div class="filters">
			<h3>Filters</h3>
			<div id="seatType">
				<strong>Seat Type</strong><br>
				<input type="checkbox" id="normal" value="normal"> Normal<br>
				<input type="checkbox" id="semi-sleeper" value="semi-sleeper"> Semi-Sleeper<br>
				<input type="checkbox" id="sleeper" value="sleeper"> Sleeper<br>
			</div>
			<br>
			<div id="acType">
				<strong>AC Type</strong><br>
				<input type="checkbox" id="ac" value="AC"> AC<br>
				<input type="checkbox" id="non-ac" value="NON-AC"> NON-AC<br>
			</div>
			<br>
			<div id="departureSlot">
				<strong>Departure Time</strong><br>
				<input type="checkbox" id="morning" value="Morning"> Morning<br>
				<input type="checkbox" id="afternoon" value="Afternoon"> Afternoon<br>
				<input type="checkbox" id="evening" value="Evening"> Evening<br>
				<input type="checkbox" id="night" value="Night"> Night<br>
			</div>
		</div>
